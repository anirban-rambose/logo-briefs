<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Daily — Logo Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --border: #e0ddd8;
  --border-light: #ece9e3;
  --text: #1a1916;
  --muted: #8a877f;
  --faint: #c5c2bb;
  --accent: #c84b2f;
  --accent-bg: #fdf1ee;
  --green: #2d6a4a;
  --green-bg: #edf5f1;
  --blue: #2952a3;
  --serif: 'Libre Baskerville', Georgia, serif;
  --mono: 'DM Mono', monospace;
}
html { background: var(--bg); color: var(--text); font-family: var(--serif); font-size: 15px; line-height: 1.7; }
body { min-height: 100vh; max-width: 820px; margin: 0 auto; padding: 0 28px 60px; }

header { padding: 36px 0 24px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
.site-id { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
.site-id strong { color: var(--text); font-weight: 400; }
.header-right { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.streak-num { font-family: var(--serif); font-size: 32px; font-weight: 700; color: var(--text); display: block; line-height: 1; font-style: italic; }

.card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 16px; }
.card-top { padding: 32px 36px 28px; border-bottom: 1px solid var(--border-light); }
.brand-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 14px; }
.brand-name { font-family: var(--serif); font-size: 42px; font-weight: 700; font-style: italic; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
.right-tags { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; padding-top: 6px; }
.sector-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.09em; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; white-space: nowrap; text-transform: uppercase; }
.brand-type-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.09em; color: var(--blue); border: 1px solid #c5d0e8; padding: 4px 10px; white-space: nowrap; text-transform: uppercase; background: #f0f3fb; }
.tagline { font-size: 15px; color: var(--muted); font-style: italic; line-height: 1.6; margin-bottom: 10px; }
.brand-context { font-size: 13px; color: var(--text); line-height: 1.7; }
.diff-row { display: flex; align-items: center; gap: 5px; margin-top: 16px; }
.diff-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--faint); text-transform: uppercase; margin-right: 4px; }
.pip { width: 7px; height: 7px; background: var(--border); display: inline-block; }
.pip.on { background: var(--text); }

.fields { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border-light); }
.field { padding: 18px 28px; border-right: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); }
.field:nth-child(2n) { border-right: none; }
.field.full { grid-column: 1 / -1; border-right: none; border-bottom: none; }
.field-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--faint); text-transform: uppercase; margin-bottom: 7px; }
.field-value { font-size: 13px; color: var(--text); line-height: 1.6; }
.kw { display: inline-block; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-right: 8px; }
.kw::before { content: '#'; }

.constraint-row { padding: 18px 28px; background: var(--accent-bg); border-bottom: 1px solid #e8c5bc; display: flex; gap: 14px; align-items: flex-start; }
.c-marker { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.1em; white-space: nowrap; padding-top: 2px; text-transform: uppercase; }
.c-text { font-size: 13px; color: #6b2318; line-height: 1.6; }
.c-text strong { font-weight: 700; color: var(--accent); }

.visual-dir { padding: 24px 28px 0; }
.vd-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); margin-bottom: 12px; }
.vd-concept { font-family: var(--serif); font-size: 22px; font-weight: 700; font-style: italic; color: var(--text); margin-bottom: 2px; }
.vd-source { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-bottom: 10px; }
.vd-desc { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 620px; }

.vd-canvas-wrap { margin: 20px 0 0; height: 180px; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); background: var(--bg); overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }

.vd-prompts-wrap { padding: 16px 28px 24px; }
.vd-prompt { font-size: 13px; color: var(--text); line-height: 1.5; display: flex; gap: 12px; margin-bottom: 8px; }
.vd-prompt:last-child { margin-bottom: 0; }
.vd-prompt::before { content: '—'; color: var(--faint); flex-shrink: 0; font-family: var(--mono); }

/* ACTIONS */
.actions { display: flex; gap: 8px; align-items: center; margin-bottom: 40px; flex-wrap: wrap; }
button { font-family: var(--mono); font-size: 11px; letter-spacing: 0.07em; cursor: pointer; padding: 10px 18px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); text-transform: uppercase; transition: all 0.12s; outline: none; }
button:hover { border-color: var(--text); color: var(--text); }
button:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
button.primary:hover { background: #2d2c2a; }
button.done { color: var(--green); border-color: #a8ccba; background: var(--green-bg); }
button.done:hover { border-color: var(--green); }
button.nav { padding: 10px 14px; font-size: 14px; letter-spacing: 0; }
.btn-spacer { flex: 1; }
.nav-group { display: flex; gap: 0; }
.nav-group button { border-right-width: 0; }
.nav-group button:last-child { border-right-width: 1px; }
.brief-counter { font-family: var(--mono); font-size: 10px; color: var(--faint); white-space: nowrap; }

.history { border-top: 1px solid var(--border); padding-top: 28px; }
.history-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); margin-bottom: 14px; }
.h-item { display: flex; gap: 16px; font-family: var(--mono); font-size: 11px; padding: 7px 0; border-bottom: 1px solid var(--border-light); color: var(--muted); }
.h-date { min-width: 90px; color: var(--faint); }
.h-name { color: var(--text); }
.h-tick { color: var(--green); margin-left: auto; }

footer { border-top: 1px solid var(--border); padding: 16px 0; font-family: var(--mono); font-size: 10px; color: var(--faint); display: flex; justify-content: space-between; margin-top: 32px; }

@media (max-width: 580px) {
  .fields { grid-template-columns: 1fr; }
  .field { border-right: none !important; }
  .card-top, .field, .constraint-row, .visual-dir, .vd-prompts-wrap { padding-left: 20px; padding-right: 20px; }
  .brand-name { font-size: 30px; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="site-id"><strong>Brief Daily</strong> — Logo Practice</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px;" id="hdr-date"></div>
  </div>
  <div class="header-right">
    <span class="streak-num" id="streak-num">0</span>
    day streak
  </div>
</header>

<div class="card" id="main-card">
  <div class="card-top">
    <div class="brand-row">
      <div class="brand-name" id="b-name">—</div>
      <div class="right-tags">
        <div class="sector-tag" id="b-sector">—</div>
        <div class="brand-type-tag" id="b-type">—</div>
      </div>
    </div>
    <div class="tagline" id="b-tagline">—</div>
    <div class="brand-context" id="b-context">—</div>
    <div class="diff-row">
      <span class="diff-label">Difficulty</span>
      <span class="pip" id="p1"></span><span class="pip" id="p2"></span><span class="pip" id="p3"></span>
    </div>
  </div>

  <div class="fields">
    <div class="field"><div class="field-label">Personality</div><div class="field-value" id="b-personality">—</div></div>
    <div class="field"><div class="field-label">Target Audience</div><div class="field-value" id="b-audience">—</div></div>
    <div class="field"><div class="field-label">Color Direction</div><div class="field-value" id="b-color">—</div></div>
    <div class="field"><div class="field-label">Mark Style</div><div class="field-value" id="b-style">—</div></div>
    <div class="field full"><div class="field-label">Keywords</div><div class="field-value" id="b-keywords"></div></div>
  </div>

  <div class="constraint-row">
    <div class="c-marker">Constraint</div>
    <div class="c-text" id="b-constraint">—</div>
  </div>

  <div class="visual-dir">
    <div class="vd-label">Visual Direction — Optional Provocation</div>
    <div class="vd-concept" id="v-concept">—</div>
    <div class="vd-source" id="v-source">—</div>
    <div class="vd-desc" id="v-desc">—</div>
  </div>
  <div class="vd-canvas-wrap"><canvas id="v-canvas"></canvas></div>
  <div class="vd-prompts-wrap" id="v-prompts"></div>
</div>

<div class="actions">
  <div class="nav-group">
    <button class="nav" id="btn-prev" onclick="prevBrief()" title="Previous brief">←</button>
    <button class="nav" id="btn-next" onclick="nextBrief()" title="Next brief">→</button>
  </div>
  <button class="primary" onclick="randomBrief()">Random</button>
  <button class="done" onclick="markDone()">Mark Done ✓</button>
  <div class="btn-spacer"></div>
  <div class="brief-counter" id="brief-counter"></div>
</div>

<div id="history-wrap" style="display:none;">
  <div class="history">
    <div class="history-label">Completed Sessions</div>
    <div id="history-list"></div>
  </div>
</div>

<footer>
  <span>Brief Daily — Logo Practice</span>
  <span id="footer-count">0 completed</span>
</footer>

<script>
// ── CANVAS HELPERS ──
function ctx2(canvas) {
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  return [ctx, W, H];
}

// ── ALL DRAW FUNCTIONS ──

function drawSpool(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const cx=W*0.38, cy=H/2;
  for(let i=2;i<26;i++){ctx.beginPath();ctx.arc(cx,cy,i*14,0,Math.PI*2);ctx.strokeStyle=`rgba(26,25,22,${Math.max(0.03,0.38-i*0.013)})`;ctx.lineWidth=i<5?1.5:0.7;ctx.stroke();}
  ctx.fillStyle='#1a1916';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+26*14,cy);
  for(let x=cx+26*14;x<W*0.96;x++){const p=(x-(cx+26*14))/(W*0.96-cx-26*14);ctx.lineTo(x,cy+Math.sin(p*Math.PI*6)*(H*0.09*(1-p)));}
  ctx.strokeStyle='rgba(26,25,22,0.22)';ctx.lineWidth=1;ctx.stroke();
}

function drawPhototaxis(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const cx=W*0.55,cy=H*0.45;
  for(let p=0;p<5;p++){ctx.beginPath();let r=W*0.38+p*20;for(let t=0;t<300;t++){r*=0.988;const x=cx+r*Math.cos(p*(Math.PI*2/5)+0.3+t*0.07),y=cy+r*Math.sin(p*(Math.PI*2/5)+0.3+t*0.07);t===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.strokeStyle=`rgba(26,25,22,${0.08+p*0.04})`;ctx.lineWidth=0.8;ctx.stroke();}
  ctx.fillStyle='#c84b2f';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.strokeStyle='rgba(200,75,47,0.2)';ctx.lineWidth=1;ctx.stroke();
}

function drawGranular(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const rng=(a,b)=>a+Math.random()*(b-a);
  for(let i=0;i<50;i++){const x=rng(W*0.04,W*0.96),y=rng(H*0.08,H*0.92),r=rng(20,55),sides=Math.floor(rng(5,9)),angle=rng(0,Math.PI);ctx.beginPath();for(let j=0;j<sides;j++){const a=angle+j*(Math.PI*2/sides)+rng(-0.2,0.2),rr=r*rng(0.72,1);j===0?ctx.moveTo(x+rr*Math.cos(a),y+rr*Math.sin(a)):ctx.lineTo(x+rr*Math.cos(a),y+rr*Math.sin(a));}ctx.closePath();ctx.fillStyle=`rgba(26,25,22,${rng(0.03,0.08)})`;ctx.strokeStyle=`rgba(26,25,22,${rng(0.07,0.15)})`;ctx.lineWidth=0.6;ctx.fill();ctx.stroke();}
}

function drawPalimpsest(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  for(let i=0;i<12;i++){ctx.beginPath();ctx.moveTo(0,H*0.1+i*H*0.07);ctx.lineTo(W,H*0.1+i*H*0.07);ctx.strokeStyle=`rgba(26,25,22,${i%3===0?0.09:0.04})`;ctx.lineWidth=0.5;ctx.stroke();}
  [['MEMORIA',W*0.09,W*0.1,H*0.35,0.06,-0.03],['SCRIPTA',W*0.07,W*0.2,H*0.62,0.05,0.01],['RECALL',W*0.08,W*0.12,H*0.78,0.06,0]].forEach(([t,sz,x,y,a,rot])=>{ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.font=`italic ${sz}px Libre Baskerville,serif`;ctx.fillStyle=`rgba(26,25,22,${a})`;ctx.fillText(t,0,0);ctx.restore();});
  ctx.font=`bold italic ${W*0.063}px Libre Baskerville,serif`;ctx.fillStyle='rgba(26,25,22,0.72)';ctx.fillText('PALIMPSEST',W*0.07,H*0.55);
}

function drawFlint(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const cx=W*0.45,cy=H*0.5;
  [[0,-1,0.9],[0.5,-0.8,0.7],[0.9,-0.3,0.5],[1,0.2,0.4],[-0.4,-0.9,0.6],[-0.8,-0.4,0.3],[0.7,0.7,0.2],[-0.3,0.8,0.15]].forEach(([dx,dy,w])=>{const len=W*0.1*w+W*0.08,j=(Math.random()-0.5)*0.12;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+(dx+j)*len,cy+(dy+j*0.5)*len*0.65);ctx.strokeStyle=`rgba(26,25,22,${w*0.7+0.1})`;ctx.lineWidth=w*2.5;ctx.stroke();});
  ctx.fillStyle='#1a1916';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
}

function drawTidepool(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  [{cx:W*0.3,cy:H*0.45,rx:W*0.17,ry:H*0.28,rot:-0.3},{cx:W*0.56,cy:H*0.5,rx:W*0.13,ry:H*0.22,rot:0.2},{cx:W*0.73,cy:H*0.42,rx:W*0.09,ry:H*0.15,rot:-0.1}].forEach((p,i)=>{ctx.save();ctx.translate(p.cx,p.cy);ctx.rotate(p.rot);ctx.beginPath();ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);ctx.fillStyle=`rgba(26,25,22,${0.06-i*0.015})`;ctx.strokeStyle=`rgba(26,25,22,${0.18-i*0.04})`;ctx.lineWidth=1;ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(0,0,p.rx*0.68,p.ry*0.68,0,0,Math.PI*2);ctx.strokeStyle='rgba(26,25,22,0.06)';ctx.lineWidth=0.5;ctx.stroke();ctx.restore();});
}

function drawConductor(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const cx=W*0.32,cy=H/2;
  [{r:80,n:7,a:0.5},{r:52,n:5,a:0.35},{r:28,n:3,a:0.22}].forEach(l=>{for(let i=0;i<l.n;i++){const a=i*(Math.PI*2/l.n);ctx.beginPath();ctx.arc(cx+Math.cos(a)*l.r*0.55,cy+Math.sin(a)*l.r*0.55,l.r/l.n*0.7,0,Math.PI*2);ctx.strokeStyle=`rgba(26,25,22,${l.a})`;ctx.fillStyle='rgba(26,25,22,0.04)';ctx.lineWidth=1;ctx.fill();ctx.stroke();}});
  ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.fillStyle='rgba(26,25,22,0.7)';ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+90,cy);ctx.bezierCurveTo(W*0.6,cy-H*0.1,W*0.8,cy+H*0.05,W*0.96,cy);ctx.strokeStyle='rgba(26,25,22,0.18)';ctx.lineWidth=2;ctx.stroke();
}

function drawCompound(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const pl=W*0.1,pr=W*0.08,pt=H*0.15,W2=W-pl-pr,H2=H-pt-H*0.2;
  for(let i=0;i<=4;i++){ctx.beginPath();ctx.moveTo(pl,pt+(i/4)*H2);ctx.lineTo(W-pr,pt+(i/4)*H2);ctx.strokeStyle='rgba(26,25,22,0.06)';ctx.lineWidth=0.5;ctx.stroke();}
  ctx.beginPath();ctx.moveTo(pl,pt+H2);ctx.lineTo(W-pr,pt);ctx.strokeStyle='rgba(26,25,22,0.1)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();const maxV=Math.pow(1.085,30)-1;for(let i=0;i<=200;i++){const t=i/200,v=Math.pow(1.085,t*30)-1;i===0?ctx.moveTo(pl,pt+H2):ctx.lineTo(pl+t*W2,pt+H2-(v/maxV)*H2);}ctx.strokeStyle='rgba(26,25,22,0.7)';ctx.lineWidth=2;ctx.stroke();
  const tv=Math.pow(1.085,21)-1;ctx.fillStyle='#c84b2f';ctx.beginPath();ctx.arc(pl+0.7*W2,pt+H2-(tv/maxV)*H2,5,0,Math.PI*2);ctx.fill();
}

function drawIndexCard(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  [{x:W*0.25+16,y:H*0.18+12,rot:0.06,a:0.25},{x:W*0.25+8,y:H*0.18+6,rot:0.02,a:0.4},{x:W*0.25,y:H*0.18,rot:0,a:1}].forEach(c=>{const cw=W*0.5,ch=H*0.64;ctx.save();ctx.translate(c.x+cw/2,c.y+ch/2);ctx.rotate(c.rot);ctx.beginPath();ctx.rect(-cw/2,-ch/2,cw,ch);ctx.fillStyle=`rgba(250,249,247,${c.a})`;ctx.strokeStyle=`rgba(26,25,22,${c.a*0.22})`;ctx.lineWidth=1;ctx.fill();ctx.stroke();if(c.rot===0){ctx.beginPath();ctx.rect(-cw/2,-ch/2,cw*0.22,H*0.09);ctx.fillStyle='rgba(26,25,22,0.07)';ctx.fill();for(let i=0;i<5;i++){const ly=-ch/2+H*0.15+i*(H*0.09);ctx.beginPath();ctx.moveTo(-cw/2+W*0.05,ly);ctx.lineTo(cw/2-W*0.04,ly);ctx.strokeStyle='rgba(26,25,22,0.09)';ctx.lineWidth=0.5;ctx.stroke();}}ctx.restore();});
}

function drawThreshold(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const cx=W/2,cy=H/2;
  for(let i=5;i>=0;i--){const t=i/5,fw=W*(0.25+t*0.55),fh=H*(0.3+t*0.52);ctx.beginPath();ctx.rect(cx-fw/2,cy-fh/2,fw,fh*0.88);ctx.strokeStyle=`rgba(26,25,22,${0.07+(1-t)*0.18})`;ctx.lineWidth=0.8;ctx.stroke();}
  ctx.fillStyle='rgba(26,25,22,0.1)';ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
}

function drawBaseline(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  const lH=H/7;
  for(let i=0;i<8;i++){const y=i*lH,isB=i%2===1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle=isB?'rgba(200,75,47,0.22)':'rgba(26,25,22,0.07)';ctx.lineWidth=isB?0.8:0.4;ctx.stroke();}
  ctx.font=`bold italic ${H*0.36}px Libre Baskerville,serif`;ctx.fillStyle='rgba(26,25,22,0.68)';ctx.fillText('Gg',W*0.1,lH*5);
  ctx.font=`${H*0.07}px DM Mono,monospace`;ctx.fillStyle='rgba(200,75,47,0.45)';ctx.fillText('baseline',W*0.64,lH*5+12);
  ctx.beginPath();ctx.moveTo(W*0.62,lH*5);ctx.lineTo(W*0.96,lH*5);ctx.strokeStyle='rgba(200,75,47,0.28)';ctx.lineWidth=0.6;ctx.stroke();
}

function drawRoomTone(canvas) {
  const [ctx,W,H] = ctx2(canvas);
  ctx.beginPath();ctx.moveTo(0,H/2);
  for(let x=0;x<W;x++){const t=x/W,env=Math.sin(t*Math.PI)*Math.pow(1-t,0.5),amp=(Math.sin(x*0.04)*0.5+Math.sin(x*0.013+1)*0.3+Math.sin(x*0.097+2)*0.2)*env*H*0.32;ctx.lineTo(x,H/2+amp);}

  {name:"Spool",sector:"Dev Tools",type:"B2B SaaS",difficulty:1,tagline:"Version control for design files — built for teams that move fast.",context:"Spool sits between Figma and GitHub. It tracks changes to design assets over time, lets teams branch and merge visual work, and makes design history auditable. It's a workflow tool, not a creative one — serious, functional, indispensable to design-led product teams.",personality:"Precise, low-ego, dependable",audience:"Product designers and design leads at software companies",color:"Near-black with one punchy unexpected accent — dusty orange or electric teal",style:"Wordmark — weight and spacing carry everything",keywords:["versioning","thread","rewind","record"],constraint:"Must work as a <strong>monochrome icon in GitHub's sidebar</strong> — tiny, no color, no texture.",visual:{concept:"Thread & Winding",source:"from textile craft — storing length as radius",desc:"A spool holds length as radius — the more you wind, the larger the form grows. Unwinding is reading back. Branching is splitting the thread mid-spool. The visual logic is layered, circular, and continuous — a very different shape for version history than a flat timeline.",prompts:["A circular mark of tightly wound concentric rings — one line spiraling without ever touching itself","The S formed entirely from a single looping thread path","A mark where the O is replaced by a spool shape — round, layered, slightly mechanical"],draw:drawSpool}},

  {name:"Moth",sector:"Dev Tools",type:"Developer Tooling",difficulty:2,tagline:"Error tracking that actually tells you what broke and why.",context:"Moth is a next-generation bug monitoring tool. Where Sentry shows you what crashed, Moth tries to explain why — using runtime context, code history, and blame analysis. It's opinionated, fast, and slightly irreverent. Named after the original software bug: a literal moth found in a relay at Harvard in 1947.",personality:"Sharp, a little dark, technically smart",audience:"Backend engineers and CTOs tired of debugging dashboards",color:"Deep amber or warm brown — think old paper, moth wings, not neon",style:"Logomark — abstract, not literal",keywords:["trace","burn","hunt","origin"],constraint:"The mark <strong>cannot look like a moth</strong> — no wings, no antennae. Abstract and ownable.",visual:{concept:"Phototaxis",source:"from biology — involuntary spiral toward a light source",desc:"Moths don't navigate toward light — they use the moon as a fixed compass bearing. When a closer light disrupts that system, they spiral inward toward it. The trajectory is a logarithmic spiral converging on a bright point. Beautiful failure of a navigation algorithm. This is what bugs do to systems too.",prompts:["A spiral mark converging on a point — not circular, slightly irregular, like a path losing its bearing","A mark where the negative space is the point of failure — everything orbits it","The M whose strokes are drawn as spiral paths rather than straight lines"],draw:drawPhototaxis}},

  {name:"Gravel",sector:"Infrastructure",type:"Open Source",difficulty:1,tagline:"A lightweight job queue for Node.js that doesn't get in your way.",context:"Gravel is an open-source background job processor. It's not trying to be enterprise software — it's built for indie developers and small teams who want something that just works. The brand should feel like a tool you find in a workshop, not a product from a VC-backed startup. Humble, useful, no pitch.",personality:"Humble, direct, no marketing speak",audience:"Solo developers and small engineering teams",color:"Warm gray and stone — earthy, tactile. No tech blue.",style:"Wordmark with simple geometric mark",keywords:["queue","grind","settle","rough"],constraint:"Will live primarily in <strong>README files and npm pages</strong> — must look great small, in Markdown.",visual:{concept:"Granular Material",source:"from physics — how loose irregular solids settle and hold form",desc:"Gravel doesn't stack like bricks. Each piece is different, but together they form a stable surface through friction and interlocking. The visual is organized randomness: varied but cohesive. The math of how granular materials settle is surprisingly complex — the brand lives in that tension.",prompts:["A letterform built from irregular but fitting shapes — like stones pressing against each other","A wordmark where letter spacing is slightly uneven, as if the letters settled naturally","A simple square mark subdivided into irregular polygons — a geological fill"],draw:drawGranular}},

  {name:"Palimpsest",sector:"AI / LLMs",type:"B2B SaaS",difficulty:3,tagline:"Long-term memory infrastructure for AI assistants.",context:"Palimpsest stores, indexes, and retrieves conversational memory for AI products. Named for ancient manuscripts scraped and rewritten over — earlier texts bleed through under UV light. If you're building a chatbot that should remember users across sessions, this is the memory layer. Deeply technical infrastructure with a surprisingly poetic name.",personality:"Thoughtful, literary, technically rigorous",audience:"AI engineers and product teams building LLM-powered products",color:"Aged parchment tones — cream, sepia, faded ink — with a sharp modern accent",style:"Wordmark — the long name is the point, don't abbreviate it",keywords:["layer","overwrite","recall","trace"],constraint:"The name is long. The <strong>wordmark must be legible at 240px wide</strong> — spacing and weight are critical.",visual:{concept:"Layered Overwriting",source:"from bookmaking history — scraped vellum reused across centuries",desc:"A palimpsest is a manuscript page scraped clean and written on again — multiple times. The page holds all its versions simultaneously. This is exactly what memory does: new experiences are written over old ones, but the old shapes the new. The visual is accumulated layers, partially visible.",prompts:["A letterform showing faint ghost layers beneath the main stroke — earlier versions bleeding through","A mark built from overlapping transparent rectangles, each a different weight","The P drawn as if written twice — once thin, once thick, slightly misaligned"],draw:drawPalimpsest}},

  {name:"Flint",sector:"AI / Data",type:"Developer Tool",difficulty:1,tagline:"Generate synthetic training data at scale — no data scientists needed.",context:"Flint lets engineering teams generate realistic fake datasets for testing, fine-tuning, and model development. Strike Flint, get a spark — the metaphor is immediate ignition. It's solo-developer-friendly: fast, no setup, pay-as-you-go. The brand should feel immediate and direct. No startup fluff.",personality:"Direct, fast, no friction",audience:"ML engineers and data engineers who hate waiting for real data",color:"Charcoal and warm off-white — or a spark color: amber, orange-yellow",style:"Short wordmark or single-letter mark",keywords:["spark","ignite","raw","instant"],constraint:"The mark must read as a single <strong>bold, immediate gesture</strong> — one idea, stated once. No complexity.",visual:{concept:"Percussion Ignition",source:"from early fire-making — the moment a struck stone produces spark",desc:"Flint doesn't produce fire through heat — through speed. The strike shatters tiny flakes which oxidize instantly. The form is radial, asymmetric, and always in the moment of happening — never at rest, never decorative. This is what the brand should feel like.",prompts:["A mark of three or four sharp radiating lines — not a starburst, more like a crack radiating from impact","The letter F with one stroke knocked off-axis, like it's been struck","An asymmetric form that reads as pure motion — angled, not centered"],draw:drawFlint}},

  {name:"Tidepool",sector:"Analytics",type:"Consumer / B2C",difficulty:2,tagline:"A personal analytics dashboard for your entire digital life.",context:"Tidepool aggregates data from all your apps — health, finances, productivity, social, sleep — into one personal dashboard. Not for power users or data scientists. For curious people who want to understand themselves better. The brand needs to feel warm and self-reflective, not clinical or surveillance-like.",personality:"Curious, intimate, non-judgmental",audience:"Self-aware adults aged 25–45 who track things but aren't obsessive",color:"Tidal blues and soft greens — or warm earth tones. Avoid dashboard gray.",style:"Logomark + wordmark — the mark should feel organic, not geometric",keywords:["collect","surface","reflect","cycle"],constraint:"Will appear primarily as a <strong>mobile app icon</strong> — must work at 60×60px, filled with color.",visual:{concept:"Tidal Pools",source:"from coastal ecology — self-contained ecosystems left by receding water",desc:"When the tide goes out, it leaves behind small pools containing complete ecosystems. Each pool is isolated but connected to the whole ocean. They accumulate what the tide brings. This is what Tidepool does with data — left behind by your daily flow, collected in one place.",prompts:["A mark that looks like an irregular pool shape — not a drop, not a circle, something in between","Overlapping curved forms suggesting depth and containment","A wordmark where the O in pool becomes a water-filled lens — reflective, slightly organic"],draw:drawTidepool}},

  {name:"Copper",sector:"Fintech",type:"B2B SaaS",difficulty:2,tagline:"Banking infrastructure for marketplace platforms.",context:"Copper is a banking-as-a-service API for companies building two-sided marketplaces — the financial layer underneath an Etsy, Rover, or TaskRabbit. It handles escrow, payouts, tax, and compliance. The name references both the metal and colloquial money. Serious infrastructure with a warm, grounded brand.",personality:"Trustworthy, direct, quietly warm",audience:"Engineering and finance leads at marketplace startups",color:"The actual color of copper — warm, reddish-brown — as a brand color, not a gradient or metallic effect",style:"Symbol mark — something that doesn't look like a bank or a coin",keywords:["conduit","flow","connect","forge"],constraint:"<strong>No coins, no dollar signs, no piggy banks.</strong> Every fintech does that. The mark must carry weight without those clichés.",visual:{concept:"Electrical Conductivity",source:"from materials science — copper as the standard medium for charge",desc:"Copper is used in wiring because electrons move through it with almost no resistance. The visual of conductivity isn't a coin — it's a path. A circuit. Something that exists only to let other things happen through it. This is the brand logic.",prompts:["A mark that reads as a connector — two nodes joined by an efficient path","A geometric form built from the cross-section of wire — circular, layered, structural","The letter C that reads as both a terminal and an arc — carrying charge, not containing it"],draw:drawConductor}},

  {name:"Earnest",sector:"Fintech",type:"Consumer / B2C",difficulty:1,tagline:"The first savings account that works as hard as you do.",context:"Earnest is a consumer savings product for young adults skeptical of banks. It uses behavioral nudges, visual progress tracking, and gentle automation. No hustle culture. No fake positivity. The name is intentional: earnest as in sincere, without pretension. A brand that means what it says.",personality:"Frank, encouraging, non-preachy",audience:"Adults aged 22–35 who feel financially behind and want to catch up",color:"Honest colors — warm white and forest green, or deep blue and cream. No fintech teal.",style:"Wordmark — the name does the work",keywords:["honest","steady","grow","real"],constraint:"The logotype must feel <strong>handwritten or slightly imperfect</strong> — too polished kills the honesty.",visual:{concept:"Compound Interest Curve",source:"from personal finance — returns that build on themselves over time",desc:"The shape of compound interest looks flat for a long time, then suddenly isn't. It's patient, not dramatic. Most people give up before the curve breaks upward. The metaphor is not about money — it's about the shape of patience paying off.",prompts:["A logotype where letter height increases very slightly left to right — imperceptibly at first, then clearly","An underline that curves upward toward the end — drawn by hand, not mathematically","The E with horizontal strokes that grow longer from top to bottom — the curve built into the letter"],draw:drawCompound}},

  {name:"Commonplace",sector:"Productivity",type:"Consumer SaaS",difficulty:2,tagline:"A personal knowledge base that actually surfaces what you've saved.",context:"Commonplace (named for the 17th-century practice of collecting notable passages in a notebook) is a note-taking app that fights the curse of the forgotten note. Everything saved is automatically tagged, linked, and resurfaces when relevant. It's the anti-Notion — opinionated, fast, quiet. For people who think in notes but lose them.",personality:"Scholarly, calm, slightly old-fashioned in a charming way",audience:"Writers, researchers, and curious people drowning in open browser tabs",color:"Old paper and ink — cream, warm gray, forest green or aged brown as accent",style:"Typographic mark — letterpress energy",keywords:["collect","recall","index","quiet"],constraint:"Must work as a <strong>browser extension icon</strong> — a tiny badge seen every day. Must feel like something you trust.",visual:{concept:"The Zettelkasten",source:"from knowledge management — Niklas Luhmann's index card filing system",desc:"Before software, researchers built knowledge systems from physical index cards — each holding one idea, linked by handwritten references. Luhmann built a system of over 90,000 cards he called his conversation partner. The visual logic is simple: a card has edges, a front, a position in a sequence.",prompts:["A mark of overlapping index cards at a slight angle — organized but not rigid","The letter C formed from a card corner with a tab — readable as both letter and system","A wordmark set in a serif that feels typeset, not designed — letterpress weight"],draw:drawIndexCard}},

  {name:"Foyer",sector:"Productivity",type:"B2B SaaS",difficulty:1,tagline:"The first thing your team sees every morning — a shared daily brief.",context:"Foyer is a team start page: a browser home page for organizations. It shows the day's priorities, who's working on what, open blockers, and company pulse. Built for async teams who lose context between days. The name comes from the architectural concept: the transitional room you enter before anything else.",personality:"Calm, organized, subtly social",audience:"Remote and hybrid teams of 10–100 people",color:"Warm architecture tones — off-white, warm gray, soft terracotta or sage accent",style:"Wordmark or combination mark — something that feels like a threshold",keywords:["entry","daily","orient","shared"],constraint:"Lives as a <strong>browser new-tab logo</strong> — seen every single day. Must not tire. Restraint is a feature.",visual:{concept:"Threshold Architecture",source:"from architectural design — the foyer as a decompression and orientation space",desc:"A foyer isn't a room — it's a transition. Architects design them to reorient you, decompress you, and prepare you for what comes next. The visual grammar is symmetry, framing, and depth: you stand at the center of a space that opens in front of you.",prompts:["A mark built from two vertical forms flanking a central axis — pillars framing a doorway","An F drawn with intentional symmetry, its crossbar reading as a floor plan","A mark with a visible center — everything else orients around it"],draw:drawThreshold}},

  {name:"Grids & Ghosts",sector:"Design Tools",type:"Consumer / Prosumer",difficulty:3,tagline:"A type-specimen tool for designers who take typography seriously.",context:"Grids & Ghosts is a web app for testing and comparing typefaces in real editorial layouts. Designers paste text, choose fonts, and the app generates production-quality specimen pages. The name is typographic language: the grid is the structure, the ghost is the unfilled baseline. Niche, opinionated, quietly beloved.",personality:"Typographically obsessive, a bit precious about it",audience:"Senior designers, typographers, and brand designers at agencies",color:"Black and paper white — or one bold editorial color. The type is the brand.",style:"Logotype — the name itself, set beautifully",keywords:["baseline","grid","weight","specimen"],constraint:"The logotype <strong>must demonstrate typographic taste</strong> — the logo is the portfolio piece. Everything you know about type, shown here.",visual:{concept:"The Baseline Grid",source:"from typographic layout — the invisible horizontal rhythm all text rests on",desc:"The baseline grid is invisible structure that makes pages feel stable. When you violate it, text looks wrong and readers can't say why. When you honor it, nothing calls attention to itself. The grid exists only to disappear. Every professional layout sits on one.",prompts:["A logotype set on a visible baseline — the grid is part of the logo, not behind it","Letters that hang from their caps height with baselines shown in contrasting weight","The ampersand in Grids & Ghosts drawn as the most beautiful ampersand you can produce"],draw:drawBaseline}},

  {name:"Room Tone",sector:"Creative Tools",type:"B2C / Prosumer",difficulty:2,tagline:"Background audio for creative work — generated, endless, never repeating.",context:"Room Tone generates ambient soundscapes using AI — not playlists, not loops, but continuously generated audio environments. A rainy library. A Tokyo subway car. A coffee shop at 2pm. For people who design, write, code, and think for hours at a stretch. The brand lives in the emotional space between utility and atmosphere.",personality:"Quiet, atmospheric, slightly cinematic",audience:"Freelancers, writers, remote workers, creative professionals",color:"Muted and warm — dusty rose, slate, warm gray. Nothing bright or loud.",style:"Wordmark + optional abstract mark — should feel like sound or acoustic form",keywords:["ambient","texture","presence","still"],constraint:"Must feel <strong>quiet in use</strong> — this brand should never shout. Every element should have breathing room.",visual:{concept:"Room Acoustics",source:"from audio engineering — how sound decays in a physical space",desc:"Every room has a sonic fingerprint — the way sound decays after a noise. Sound engineers call this 'room tone.' It's the silence between sounds, made audible. Recorded before a shoot so editors can match it. The visual form is a waveform that tapers, a frequency that fades after the source stops.",prompts:["A wordmark where letter strokes taper toward their ends — sound decaying into silence","A mark made of a single irregular waveform — not a perfect sine wave but an acoustic response","The letters R and T as a pair where the whitespace between them feels like silence itself"],draw:drawRoomTone}},

  {name:"Tender",sector:"Mental Health",type:"Consumer / B2C",difficulty:2,tagline:"Therapy matching — find someone who actually gets you.",context:"Tender is a therapist-matching service that takes fit seriously — matching on specialty, communication style, cultural background, and therapeutic approach. The name is double: tenderness as care, and tending as in gardening. Not clinical. Human. Should feel like the most caring thing in the app store — without being saccharine.",personality:"Warm, direct, careful with language",audience:"Adults seeking therapy for the first time, particularly those burned by bad matches",color:"Warm terracotta and cream — or deep forest green with warm white. Nothing clinical.",style:"Wordmark — the letterforms should feel gentle",keywords:["care","match","grow","safe"],constraint:"No hearts, no hands, no people icons. Convey <strong>warmth without any literal symbol of care</strong>.",visual:{concept:"Tending a Garden",source:"from everyday life — the practice of caring for something living",desc:"Tending a garden requires attention without force. You don't pull a plant upward — you create conditions for it to grow. The visual language is about enclosure, support, and patience. Stakes and ties. Soil and structure. The frame that lets something grow into itself without interference.",prompts:["A T whose crossbar is slightly curved upward — like a branch, or something quietly alive","A wordmark where letters feel organic — not perfectly kerned, slightly warm","The negative space in the word forming something that feels like a protected enclosure"],draw:drawTending}},

  {name:"Field Notes",sector:"EdTech",type:"Consumer / B2C",difficulty:2,tagline:"Learn by building — project-based courses for curious adults.",context:"Field Notes is an online learning platform where every course is built around a real project. You don't watch lectures — you build things, document what you learn, and share your field notes with a community. Named for the notebooks scientists carry into research environments. For people who learn by doing, not watching.",personality:"Curious, practical, community-minded",audience:"Professionals and lifelong learners aged 25–45 who want tangible output from learning",color:"Notebook greens and yellows — or kraft brown and ink black. Tactile, not digital-native.",style:"Logotype — should feel stamped on a notebook cover",keywords:["observe","record","build","share"],constraint:"Should look <strong>equally good debossed on a physical notebook cover</strong> as on screen — think stamp, not pixel.",visual:{concept:"Field Research Notation",source:"from scientific fieldwork — the practice of drawing and annotating in place",desc:"Field researchers carry notebooks everywhere. They sketch what they see, annotate with measurements and questions, draw arrows between related observations. The page is a thinking surface. The visual language is hand and eye — observed marks, not designed elements. The messiness is the meaning.",prompts:["A logotype that looks stamped — slightly imperfect edges, ink texture implied","A mark combining a natural form with a ruled line — observation and structure in one","FN as an abbreviation mark — like a researcher's shorthand — bold and immediate"],draw:drawFieldNotes}},

  {name:"Archipelago",sector:"Community / Social",type:"B2C",difficulty:3,tagline:"Independent communities, connected — a cooperative for newsletter writers.",context:"Archipelago is a network for independent newsletter writers — not a platform, but a cooperative. Members share readers, cross-promote, collaborate on joint issues, and split revenue. Each newsletter stays independent (an island) but is connected to the whole (the chain). Long name, big ambition. Should feel like a publishing house, not an app.",personality:"Independent, collaborative, slightly idealistic",audience:"Newsletter writers with 1K–50K subscribers who want to grow without platform dependency",color:"Ocean cartography tones — teal, navy, aged map cream. Or a warm editorial palette.",style:"Wordmark — the long name is a statement of intent, not a problem to solve",keywords:["independent","chain","spread","open"],constraint:"The long name must hold together as a <strong>single legible unit at very small sizes</strong> — kerning is critical.",visual:{concept:"Island Chains",source:"from geography — groups of islands formed by the same geological process",desc:"Archipelagos are not random. Each island is part of the same chain — formed by the same tectonic movement, connected beneath the surface. They look separate but are one system. The visual is distinct forms that clearly belong together: variety within a shared structure.",prompts:["A mark of 5–7 dots of varying sizes arranged in a loose chain — an archipelago abstracted","The letter A whose crossbar is an island chain — the geological structure revealed in the letterform","A wordmark where each letter is subtly different in size, suggesting individual identity within a system"],draw:drawArchipelago}},

  {name:"Parallax",sector:"Spatial Computing",type:"Consumer / B2C",difficulty:3,tagline:"A browser for physical space — contextual AR without the headset.",context:"Parallax is an AR app layering contextual information over the physical world using your phone's camera. Point at a building — see its history. Point at a restaurant — see what your friends ordered. Designed for everyday use, not tech demos. Named for the optical effect where nearby objects shift more than distant ones as your viewpoint moves.",personality:"Curious, a bit magical, grounded in the real world",audience:"Early adopters aged 22–40 who use their phones as a lens on the world",color:"Layered and transparent — overlapping colors suggesting depth. Or a single color with visible depth cues.",style:"Symbol mark — must work at app icon size primarily",keywords:["depth","layer","shift","real"],constraint:"The mark must suggest <strong>two layers at different depths</strong> — a near and a far — without gradients.",visual:{concept:"Parallax Effect",source:"from optics — apparent displacement when viewpoint shifts",desc:"Hold your finger up and close one eye, then the other. Your finger jumps. The background doesn't. This is parallax — nearby things shift more than distant ones as perspective changes. The visual is two identical forms slightly offset — near and far, same but displaced.",prompts:["A mark of two identical geometric forms — one slightly offset, suggesting depth without shadow","The letter P drawn twice, one behind the other, with a deliberate gap between them","A square inside a square, off-center — the inner one closer, the outer one further"],draw:drawParallax}},

  {name:"Lull",sector:"Consumer Tech",type:"B2C",difficulty:2,tagline:"A phone app that makes your phone less interesting on purpose.",context:"Lull is a digital wellness app — but it doesn't preach. It quietly makes attention-hungry apps less stimulating: grayscale mode on demand, gentle blocking of specific apps during set times, a daily screen-time haiku. The name is a sound, an action, and a feeling. The brand should feel like a deep exhale.",personality:"Still, gentle, quietly funny",audience:"Smartphone-fatigued adults who want less, not more, from their devices",color:"The most peaceful color possible — gray, slate, warm white. The palette is the experience.",style:"Wordmark — four letters, the double-L is the design challenge",keywords:["still","pause","quiet","less"],constraint:"The logo must itself demonstrate restraint. <strong>If it's trying too hard, it's wrong.</strong>",visual:{concept:"The Fermata",source:"from music notation — the held note with no fixed duration",desc:"A fermata means hold this note longer than written — as long as it feels right. It's the pause that the performer decides. Not a rest — an extension of presence. The visual is a dot under an arc: the most minimal notation for a moment of extended stillness.",prompts:["A wordmark where the double-L has a tiny horizontal rule between them — a pause mark","The word LULL set with wide tracking, in the quietest typeface imaginable","The two L's drawn as the vertical lines of a fermata — the arc implied, not shown"],draw:drawPause}},

  {name:"Overture",sector:"Events / B2B",type:"B2B SaaS",difficulty:2,tagline:"Conference software that makes the first five minutes count.",context:"Overture is a software product for conference and event organizers — focused on the opening experience: check-in, welcome flow, first-session energy, speaker introductions. The briefest slice of event management, done extremely well. Named for the musical overture: the opening that sets the tone for everything that follows.",personality:"Confident, ceremonial, precise",audience:"Event producers, conference organizers, corporate experience designers",color:"Deep velvet red, gold, or rich navy — theatrical but not tacky. Opening-night energy.",style:"Wordmark — should feel like a printed program cover",keywords:["opening","begin","signal","ceremony"],constraint:"Must look credible on a <strong>printed event program cover</strong>. Foil-stamp test: would this look good in gold?",visual:{concept:"The Musical Overture",source:"from orchestral tradition — the introductory passage that sets the emotional tone",desc:"A musical overture introduces the themes of what's to come — compressed, out of sequence, like a preview. It's not a summary — it sets the feeling. A great overture makes you lean forward. The visual is something beginning: a curtain rising, a breath, a conductor's baton lifting before the downbeat.",prompts:["A wordmark with a visible upstroke on the O — like a baton lifting before the beat","A mark built from a rising curtain shape — an arc that opens upward and outward","The letter O drawn with deliberate weight variation — thick-to-thin, like a note swelling"],draw:drawOverture}},

  {name:"Groundwork",sector:"Climate Tech",type:"B2B / Mission-driven",difficulty:2,tagline:"Carbon accounting software for companies that actually want to change.",context:"Groundwork is a carbon accounting and reduction platform for mid-sized businesses. Not a greenwashing tool — built for companies that want to measure accurately and reduce meaningfully. Earthy but rigorous. The name is a construction metaphor: this is the work that precedes everything else.",personality:"Earnest, rigorous, non-preachy about the environment",audience:"Sustainability leads and CFOs at B-corps and ambitious mid-market companies",color:"Soil brown, stone gray, and a single dark green — earthy, not bright startup green",style:"Wordmark with mark — the mark should suggest both earth and structure",keywords:["measure","reduce","root","build"],constraint:"Must work on both a <strong>PowerPoint cover and a biodegradable paper bag</strong> — many substrates, no color dependency.",visual:{concept:"Soil Horizons",source:"from geology — the visible layers in a cross-section of earth",desc:"If you cut into the earth and look at the exposed wall, you see distinct horizontal bands — each a different color and composition. Topsoil, subsoil, parent material, bedrock. These layers are the record of centuries above them. Horizontal strata: organized, geological, full of compressed history.",prompts:["A mark built from horizontal bands of varying weight — a cross-section of the ground itself","The letter G drawn with a visible soil line — above and below are visually distinct","A wordmark that sits on a thick deliberate baseline — the weight of earth beneath it"],draw:drawSoilHorizons}},

  {name:"Meridian",sector:"Health Tech",type:"Consumer / B2C",difficulty:2,tagline:"Personalized nutrition — built around your blood work, not a trend.",context:"Meridian takes your bloodwork and genetic data and produces a personalized nutrition protocol. It's anti-supplement-industry, anti-fad-diet. Every recommendation has a citation. The brand should feel like a good doctor: confident, calm, and evidence-based. The name references both body meridians and the prime meridian — a personal zero line.",personality:"Evidence-based, calm, anti-bullshit",audience:"Health-conscious adults aged 30–55 skeptical of wellness marketing",color:"Clinical but warm — warm white, deep teal, slate. Avoid the wellness palette of rose gold and sand.",style:"Wordmark",keywords:["baseline","calibrate","reference","precise"],constraint:"Must work on <strong>printed lab reports</strong> — no color dependency, must look like it belongs next to actual medical data.",visual:{concept:"The Prime Meridian",source:"from cartography — the agreed-upon zero line from which all longitude is measured",desc:"The prime meridian is arbitrary but absolute. Once agreed upon, everything else is measured against it. Your bloodwork creates a personal prime meridian — a baseline from which all your values deviate or align. The visual is a single vertical line. Everything else positions itself relative to it.",prompts:["A wordmark bisected by a subtle vertical rule — everything measured against that line","The M of Meridian as a compass-like form — functional, not decorative","A mark that is literally a single vertical stroke — the zero line, the reference point"],draw:drawMeridianLine}},

  // ── FROM ORIGINAL BUILD (adapted to v2 format) ──

  {name:"Frameshift",sector:"Dev Tools",type:"B2B SaaS",difficulty:1,tagline:"A code review platform that learns from your team's patterns over time.",context:"Frameshift sits in the review layer of your engineering workflow. It doesn't just show diffs — it learns what your team cares about, surfaces recurring issues automatically, and gets smarter with each cycle. The name comes from molecular biology: a frameshift mutation happens when a sequence shifts by one position, reading everything differently from that point on. A small change with total consequences.",personality:"Precise, calm, slightly nerdy",audience:"Senior engineers at mid-stage startups",color:"Monochrome or deep navy + electric accent — something that reads as code-adjacent",style:"Wordmark",keywords:["systematic","shift","pattern","review"],constraint:"The mark must work at <strong>16×16px favicon</strong> size — no fine detail, no thin strokes.",visual:{concept:"Bit Drift",source:"from information theory — entropy and error in transmitted data",desc:"In digital transmission, bits occasionally flip: 0 becomes 1. The statistical shape of these errors — rare, random, clustering near thresholds — has a specific visual texture. A clean grid with occasional corrupted cells. Frameshift lives in that tension: the systematic against the anomalous.",prompts:["A letterform that contains exactly one broken pixel — intentional, ownable","A mark that reads as signal on the left, noise on the right, with a threshold edge","A monospace grid of dots with a single column shifted — like a protein frameshift mutation"],draw:drawBitDrift}},

  {name:"Lumen",sector:"AI / Data",type:"B2B SaaS",difficulty:2,tagline:"An AI that turns raw analytics into plain-English weekly digests.",context:"Lumen is an AI that reads your analytics dashboards and writes plain-English summaries for non-technical stakeholders. Marketing leads, ops managers, executives — people who need to understand data but can't (or won't) read charts. The brand needs to bridge two worlds: technical enough to be trusted, warm enough not to intimidate.",personality:"Friendly, smart, warm — never intimidating",audience:"Marketing and ops leads with no data background",color:"Warm amber or soft gold — avoid cold blues",style:"Logomark + wordmark",keywords:["clarity","insight","glow","approachable"],constraint:"Must work <strong>reversed on dark backgrounds</strong> — design for dark mode first.",visual:{concept:"Wavefront Propagation",source:"from optics — how light expands from a point source",desc:"Huygens' principle: every point on a wavefront becomes a new source of spherical waves. The result is expanding rings, but each ring is itself the origin of more rings. The form is radiating, nested, and mathematically inevitable. A very different kind of 'glow' than a generic shine effect.",prompts:["Concentric arcs emanating from a point, with visible gaps suggesting discrete pulses","A letterform built from wavefronts — the negative space forms the letter","The wordmark descending from a single vanishing point above"],draw:drawWavefront}},

  {name:"Depot",sector:"Cloud / Infra",type:"B2B SaaS",difficulty:2,tagline:"A managed container registry with built-in security scanning and access controls.",context:"Depot is a container registry with opinions. Where most registries are passive storage, Depot actively scans every push, enforces access policies, and gives you a full audit trail. It's built for platform teams who care about supply chain security. The name is deliberately humble — a depot is just where things are kept, reliably, until needed.",personality:"Reliable, no-nonsense, industrial",audience:"DevOps engineers and platform teams",color:"Neutral gray palette with one bold accent — flat, no gradients",style:"Geometric mark",keywords:["storage","secure","modular","robust"],constraint:"<strong>No gradients.</strong> Flat fill only — it's going on CLI terminal outputs and GitHub READMEs.",visual:{concept:"Bin Packing",source:"from computational geometry — optimal space allocation",desc:"Bin packing is an NP-hard problem: fitting irregular objects into the smallest possible containers. Algorithms produce dense, seemingly chaotic but mathematically optimal arrangements. The aesthetic is full-bleed, zero-waste, every pixel accounted for. Think of the Tetris endgame — but the pieces actually fit.",prompts:["A square mark subdivided into nested rectangles of varying ratios — all flush, no gaps","The letter D redrawn as a perfect bin-packed composition of smaller squares","A grid that appears random but has a hidden rule — every row sums to the same width"],draw:drawBinPack}},

  {name:"Wren",sector:"Fintech",type:"Consumer / B2C",difficulty:1,tagline:"A budgeting app for freelancers that separates personal and business money automatically.",context:"Wren targets the 60 million US freelancers who run personal and business finances through the same account because separating them feels like too much effort. Wren does it automatically — categorizing every transaction, generating quarterly tax estimates, and sending a simple weekly summary. The name evokes something small, quick, and quietly industrious.",personality:"Calm, organized, quietly clever",audience:"Freelancers aged 25–40 who hate spreadsheets",color:"Sage green or earthy tones — not corporate",style:"Wordmark with optional symbol",keywords:["clarity","flow","nature","structured"],constraint:"The logo will appear <strong>embossed on a physical debit card</strong> — must read with no color, only raised texture.",visual:{concept:"Laminar Flow",source:"from fluid dynamics — non-turbulent parallel stream layers",desc:"Below a critical Reynolds number, fluid flows in smooth, parallel layers that never mix. It's the opposite of turbulence — ordered, predictable, each molecule following the ones before it. The visual is deceptively simple: parallel bands that curve slightly but never cross. Peaceful but precise.",prompts:["A wordmark where strokes flow left to right, slightly narrowing — suggesting financial current","A symbol of stacked arcs, each slightly smaller, that converge at one edge","The negative space between two letterforms shaped as a laminar flow cross-section"],draw:drawLaminar}},

  {name:"Orbital",sector:"SaaS / Productivity",type:"B2B SaaS",difficulty:3,tagline:"A project management tool designed for async-first distributed teams across time zones.",context:"Orbital is project management built for teams where nobody is ever in the same room at the same time. It's not a Slack or a Notion — it's the connective tissue between them: tracking work, surfacing blockers, and giving every team member a clear picture of the whole, regardless of when they're online. The metaphor is astronomical: many bodies in independent orbits, all part of the same system.",personality:"Modern, global, frictionless",audience:"Remote-first teams at 20–200 person companies",color:"Deep space tones — navy, charcoal, with a bright single accent",style:"Logomark only (no wordmark for this exercise)",keywords:["orbit","connection","remote","precision"],constraint:"<strong>The mark must be circular</strong> — it's used as a profile avatar everywhere.",visual:{concept:"Lissajous Figures",source:"from physics — superimposed perpendicular oscillations",desc:"When you compose two sine waves perpendicular to each other at specific frequency ratios, the result is a Lissajous figure — a closed, knotted, endlessly elegant curve. 1:1 gives a diagonal. 2:1 gives a figure-8. 3:2 gives a three-lobed form. The shapes feel cosmic, mathematical, inevitable. This is how oscilloscopes look when musicians plug in.",prompts:["A circular logomark built from a single continuous Lissajous curve — 3:2 or 5:4 ratio","Nested Lissajous figures at different phases overlaid — showing the orbit of multiple timezones","A mark that traces a path, never doubling back, until it closes"],draw:drawLissajous}},

  {name:"Hatch",sector:"EdTech",type:"Consumer / B2C",difficulty:2,tagline:"An online school for designers to go from hobbyist to professional in 12 weeks.",context:"Hatch is an intensive online design program — not a course collection, but a structured cohort experience. Students go in as curious amateurs and come out with a portfolio, a network, and a career shift. The name is both biological (hatching from an egg) and technical (hatching as in cross-hatching, a drawing technique). It's energetic without being breathless.",personality:"Energetic, encouraging, creative",audience:"Career-changers and self-taught designers aged 22–35",color:"Warm, punchy — terracotta, marigold, or bold coral",style:"Display wordmark — expressive letterforms",keywords:["growth","creative","transformation","craft"],constraint:"The logotype must feel <strong>hand-crafted</strong> — avoid geometric sans; use custom letterform touches.",visual:{concept:"Reaction-Diffusion",source:"from mathematical biology — Turing's theory of morphogenesis",desc:"Alan Turing proposed that the patterns on animal skins emerge from two chemical substances diffusing and reacting at different rates. A simple differential equation produces breathtaking complexity. Spots become stripes with one parameter change. The result is organic but has underlying logic.",prompts:["A letterform that dissolves at its edges into organic, cellular branching","The word HATCH where each subsequent letter is progressively more 'grown' — emerging from a process","A mark that looks like it's still forming — caught mid-reaction"],draw:drawTopology}},

  {name:"Quill",sector:"AI Writing",type:"Consumer / B2C",difficulty:1,tagline:"An AI writing assistant that adapts to your voice, not the other way around.",context:"Quill learns how you write — your sentence length, your word choices, your rhythm — and assists within that style rather than flattening you into AI-speak. It's for people who have a voice and want to protect it. Writers, journalists, longform thinkers. The brand should feel literary and slightly old-fashioned in a way that's earned, not precious.",personality:"Thoughtful, literary, subtle wit",audience:"Journalists, novelists, and longform writers",color:"Ink black and paper cream — classic editorial palette",style:"Typographic mark",keywords:["writing","voice","ink","refined"],constraint:"<strong>No AI clichés</strong> — no brain icons, no sparkles, no circuit patterns. Keep it human.",visual:{concept:"Markov Chains",source:"from probability theory — state transitions with memory",desc:"A Markov chain models text as a graph: each word is a node, each likely next word an edge, with probability weights. High-probability paths are thick; rare transitions are thin threads. The structure is a network, but not the cliché kind — it has direction, weight, branching and convergence. It looks like how language actually works.",prompts:["A letterform where stroke weight shifts mid-character — thick at high-probability, thin at the rare","The word QUILL where letters transition in weight from bold to hairline, as if probability falls off","A mark that shows a branching path converging to one exit point — representing voice finding form"],draw:drawMarkov}},

  {name:"Beacon",sector:"Cybersecurity",type:"B2B SaaS",difficulty:3,tagline:"A zero-trust network access platform for hybrid enterprise teams.",context:"Beacon replaces VPNs with a zero-trust model: every user, every device, every request is verified every time. It's built for enterprises with 500+ employees who have hybrid or fully remote teams accessing sensitive systems. The brand needs to project authority without fear — the visual language of control, not alarm.",personality:"Authoritative, vigilant, trustworthy — not scary",audience:"CISOs and IT security leads at 500+ person companies",color:"Deep blue or slate with warm amber or white signal accent",style:"Symbol mark",keywords:["signal","protection","visibility","enterprise"],constraint:"Must work <strong>single color</strong> — printed on security badges and physical access cards.",visual:{concept:"Radar Cross-Section",source:"from defense physics — how objects scatter electromagnetic waves",desc:"Every object has a radar cross-section — a measure of how detectable it is. Radar returns visualize it as a polar plot: a flower-shaped diagram showing reflectivity in every direction. The form is angular, technical, and oddly beautiful. It is the shape of visibility itself.",prompts:["A mark built from a radar polar plot — angular petals of detection probability","Concentric arcs with one arc broken — the signal gap is the breach the product closes","A symbol that reads as both a shield and a radar sweep in the same geometry"],draw:drawRadar}},

  {name:"Fold",sector:"No-Code / Dev",type:"B2B SaaS",difficulty:2,tagline:"A visual data transformation tool that replaces spreadsheet formulas with drag-and-drop.",context:"Fold is for operations and analytics teams who live in spreadsheets but spend half their time fighting with VLOOKUP and INDEX-MATCH. It's a visual pipeline builder — you connect steps, map fields, and transform data without writing formulas. The name suggests both the physical action of folding (collapsing complexity) and fold in functional programming (reducing a list to a value).",personality:"Smart, clean, intuitive",audience:"Ops analysts and business teams with light technical skills",color:"Clean whites with a single accent — minimal, functional",style:"Wordmark with geometric symbol",keywords:["structure","transformation","logic","clean"],constraint:"The symbol must <strong>suggest folding or transformation</strong> abstractly — not literally show a folded paper.",visual:{concept:"Topological Homeomorphism",source:"from mathematics — continuous deformation without tearing",desc:"In topology, two shapes are homeomorphic if one can be continuously deformed into the other without cutting or gluing. A mug and a donut are the same shape. A sphere and a cube are the same. The visual of a transformation that preserves essential structure — same connectivity, different form — is exactly what Fold does to data.",prompts:["A square in the process of becoming a circle — rendered at the midpoint, neither one nor the other","A grid that bends smoothly at its midpoint, columns becoming rows","Two letterforms sharing the same underlying geometry, drawn with a transformation arrow between them"],draw:drawTopology}},

  {name:"Strand",sector:"Biotech / Health Tech",type:"B2B SaaS",difficulty:3,tagline:"A genomics data platform for clinical research teams.",context:"Strand is a data infrastructure product for clinical genomics labs — handling ingestion, storage, versioning, and analysis pipelines for sequencing data. It's not a consumer product; it's the plumbing that clinical researchers build on. The name references both genomic strands and the idea of threading data through a complex workflow.",personality:"Scientific, careful, human — not cold",audience:"Lab directors and clinical researchers",color:"Soft teal and warm white — clinical but approachable",style:"Abstract mark",keywords:["sequence","life","precision","connect"],constraint:"<strong>No DNA helixes.</strong> The mark must be abstract and ownable, not a stock-clip cliché.",visual:{concept:"Hydrophobic Collapse",source:"from biochemistry — protein folding driven by water aversion",desc:"Proteins don't fold by design — they collapse. Hydrophobic amino acids flee water, clumping inward; hydrophilic ones face out. The result is a specific 3D structure emerging from a simple rule applied across hundreds of residues. Strands pulled inward, not by intention, but by physics.",prompts:["A mark where strands appear to pull toward a central dense region — gravity-like, non-helix","A symbol made of varying-weight parallel lines that converge at one point — not touching, just attracted","A letterform that's been 'collapsed' — stretched inward as if pulled by its own physics"],draw:drawHydrophobic}},

  {name:"Cask",sector:"Data / Backend",type:"Open Source",difficulty:1,tagline:"An open-source data pipeline orchestration tool for engineering teams.",context:"Cask is an open-source tool for building and managing data pipelines — think Airflow but with a simpler interface and better local development story. It's built for data engineering teams who are tired of overconfigured enterprise tools. The name is both a storage vessel and a reference to the idea of containing and aging data flows.",personality:"No-frills, dependable, community-driven",audience:"Data engineers and backend developers",color:"Dark monochrome with warm amber or rust accent",style:"Wordmark with icon",keywords:["container","flow","store","reliable"],constraint:"Must look great in <strong>dark mode terminal environments</strong> — test contrast on true black.",visual:{concept:"Pressure Vessel Stress",source:"from materials engineering — hoop stress in cylindrical containers",desc:"A cylinder under internal pressure distributes stress in a precise mathematical way: circumferential (hoop) stress is exactly twice the longitudinal stress. Failure cracks emerge along the length, never across. This is why casks and barrels are built the way they are. There's a visual grammar here: bands, hoops, longitudinal tension.",prompts:["A lettermark built from hoop rings — the C of CASK drawn as stacked arcs, not a continuous curve","A wordmark where letters are bound by horizontal bands — suggesting barrel staves","A symbol of concentric incomplete circles, each representing a pressure layer"],draw:drawPressure}}
];

// ── STATE ──
let state = {current:0, streak:0, total:0, history:[]};
try { const s=localStorage.getItem('briefdaily_v4'); if(s) state=JSON.parse(s); } catch(e){}
// clamp
if(state.current<0) state.current=0;
if(state.current>=BRIEFS.length) state.current=BRIEFS.length-1;

function save(){try{localStorage.setItem('briefdaily_v4',JSON.stringify(state));}catch(e){}}

function goTo(idx){
  state.current = Math.max(0, Math.min(BRIEFS.length-1, idx));
  save(); render();
}
function prevBrief(){ goTo(state.current-1); }
function nextBrief(){ goTo(state.current+1); }
function randomBrief(){
  let idx; do{ idx=Math.floor(Math.random()*BRIEFS.length); }while(idx===state.current && BRIEFS.length>1);
  goTo(idx);
}
function markDone(){
  const b=BRIEFS[state.current];
  state.streak++; state.total++;
  state.history.unshift({date:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}),name:b.name,sector:b.sector});
  save();
  document.getElementById('streak-num').textContent=state.streak;
  document.getElementById('footer-count').textContent=state.total+' completed';
  goTo(state.current+1 < BRIEFS.length ? state.current+1 : 0);
  renderHistory();
}

function render(){
  const b=BRIEFS[state.current];
  document.getElementById('b-name').textContent=b.name;
  document.getElementById('b-sector').textContent=b.sector;
  document.getElementById('b-type').textContent=b.type;
  document.getElementById('b-tagline').textContent='"'+b.tagline+'"';
  document.getElementById('b-context').textContent=b.context;
  document.getElementById('b-personality').textContent=b.personality;
  document.getElementById('b-audience').textContent=b.audience;
  document.getElementById('b-color').textContent=b.color;
  document.getElementById('b-style').textContent=b.style;
  document.getElementById('b-constraint').innerHTML=b.constraint;
  document.getElementById('b-keywords').innerHTML=b.keywords.map(k=>`<span class="kw">${k}</span>`).join('');
  ['p1','p2','p3'].forEach((id,i)=>{document.getElementById(id).className='pip'+(i<b.difficulty?' on':'');});
  document.getElementById('v-concept').textContent=b.visual.concept;
  document.getElementById('v-source').textContent=b.visual.source;
  document.getElementById('v-desc').textContent=b.visual.desc;
  document.getElementById('v-prompts').innerHTML=b.visual.prompts.map(p=>`<div class="vd-prompt">${p}</div>`).join('');
  document.getElementById('brief-counter').textContent=(state.current+1)+' / '+BRIEFS.length;
  document.getElementById('btn-prev').disabled = state.current===0;
  document.getElementById('btn-next').disabled = state.current===BRIEFS.length-1;
  setTimeout(()=>{ b.visual.draw(document.getElementById('v-canvas')); },30);
}

function renderHistory(){
  if(!state.history.length)return;
  document.getElementById('history-wrap').style.display='block';
  document.getElementById('history-list').innerHTML=state.history.slice(0,10).map(h=>`<div class="h-item"><span class="h-date">${h.date}</span><span class="h-name">${h.name}</span><span>${h.sector}</span><span class="h-tick">✓</span></div>`).join('');
}

document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
document.getElementById('streak-num').textContent=state.streak;
document.getElementById('footer-count').textContent=state.total+' completed';
render();
renderHistory();
</script>
